    <script>
        function getApiKey() {
            const urlParams = new URLSearchParams(window.location.search);
            const apiKeyFromUrl = urlParams.get('api_key');

            if (apiKeyFromUrl && apiKeyFromUrl.trim() !== '') {
                return apiKeyFromUrl.trim();
            }

            return "";
        }

        const API_KEY = getApiKey();
        const BATCH_SIZE = 2;
        const MAX_RETRIES = 3;
        const MAX_RECENT = 10;

        let currentPdf = null;
        let currentFileName = "";

        // === FIXED PDF.js Worker Configuration (using your version) ===
        function setupPdfjsWorker() {
            if (typeof pdfjsLib !== "undefined") {
                pdfjsLib.GlobalWorkerOptions.workerSrc =
                    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
            }
        }

        // Wait for pdf.js to be ready
        function waitForPdfjs() {
            return new Promise((resolve) => {
                const check = () => {
                    if (typeof pdfjsLib !== "undefined") {
                        setupPdfjsWorker();
                        resolve();
                    } else {
                        setTimeout(check, 40);
                    }
                };
                check();
            });
        }

        function saveToStorage(fileName, extractedText) {
            if (!extractedText || extractedText.trim() === "") return;

            let history = JSON.parse(localStorage.getItem("pdfTextHistory") || "[]");

            // Remove duplicate if exists
            history = history.filter(item => item.fileName !== fileName);

            // Add new entry at the top
            history.unshift({
                fileName: fileName,
                text: extractedText.trim(),
                timestamp: new Date().toISOString()
            });

            // Keep only latest MAX_RECENT items
            if (history.length > MAX_RECENT) history.length = MAX_RECENT;

            localStorage.setItem("pdfTextHistory", JSON.stringify(history));

            renderRecentHistory();
        }

        function renderRecentHistory() {
            const container = document.getElementById("recent-history");
            if (!container) return;

            let history = JSON.parse(localStorage.getItem("pdfTextHistory") || "[]");

            if (history.length === 0) {
                container.innerHTML = `<p class="text-xs text-gray-400 italic p-2">Chưa có file nào</p>`;
                return;
            }

            let html = '';
            history.forEach((item, index) => {
                const date = new Date(item.timestamp);
                const timeAgo = Math.floor((Date.now() - date.getTime()) / 60000); // minutes

                html += `
                <div onclick="loadFromHistory(${index})" 
                     class="group flex items-center justify-between p-3 hover:bg-gray-100 rounded-xl cursor-pointer transition-all">
                    <div class="flex items-center gap-3 flex-1 min-w-0">
                        <span class="material-symbols-outlined text-gray-400 text-xl">article</span>
                        <div class="min-w-0">
                            <p class="text-sm font-medium text-on-surface truncate">${item.fileName}</p>
                            <p class="text-[10px] text-gray-500">${timeAgo}m ago</p>
                        </div>
                    </div>
                    <span class="material-symbols-outlined text-gray-300 group-hover:text-primary text-lg">arrow_forward</span>
                </div>
            `;
            });

            container.innerHTML = html;
        }

        window.loadFromHistory = function (index) {
            const history = JSON.parse(localStorage.getItem("pdfTextHistory") || "[]");
            if (!history[index]) return;

            const item = history[index];
            document.getElementById("output").innerText = item.text;

            // Optional: show notification
            const notif = document.createElement("div");
            notif.className = "fixed bottom-4 right-4 bg-green-600 text-white px-5 py-3 rounded-2xl text-sm shadow-lg";
            notif.textContent = `Đã tải văn bản của "${item.fileName}"`;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 2500);
        };

        // Clear all history (optional button)
        window.clearHistory = function () {
            if (confirm("Xóa toàn bộ lịch sử?")) {
                localStorage.removeItem("pdfTextHistory");
                renderRecentHistory();
            }
        };

        // Render preview page (single image)
        async function renderPreviewPage(pageNum) {
            if (!currentPdf) return;
            const container = document.getElementById("preview-container");
            container.innerHTML = `<p class="text-gray-400 text-sm">Đang tải preview trang ${pageNum}...</p>`;

            try {
                const page = await currentPdf.getPage(pageNum);

                // Better scale: use higher resolution but limit display size nicely
                const scale = 2.0;                    // ← Increased for sharper preview
                const viewport = page.getViewport({ scale });

                const canvas = document.createElement("canvas");
                const ctx = canvas.getContext("2d");
                canvas.width = viewport.width;
                canvas.height = viewport.height;

                await page.render({ canvasContext: ctx, viewport }).promise;

                const img = document.createElement("img");
                img.src = canvas.toDataURL("image/jpeg", 0.92);   // Higher quality
                img.className = "rounded-lg border shadow-sm max-h-[260px] max-w-full object-contain";  // ← Bigger & responsive
                img.title = `Trang ${pageNum}`;

                container.innerHTML = "";
                container.appendChild(img);
            } catch (err) {
                console.error(err);
                container.innerHTML = `<p class="text-red-500 text-sm">Không tải được preview trang ${pageNum}</p>`;
            }
        }

        // ==================== CLEAN TEXT FUNCTION (MỚI) ====================
        function cleanExtractedText(text) {
            if (!text || typeof text !== 'string') return '';

            let cleaned = text;

            // 1. Loại bỏ markdown bullet lists: * , - , +  (có khoảng trắng phía sau)
            cleaned = cleaned.replace(/^[ \t]*[-*+][ \t]+/gm, '');           // Bullet đầu dòng
            cleaned = cleaned.replace(/^[ \t]*\d+\.\s+/gm, '');              // Số thứ tự 1. 2. 3.

            // 2. Loại bỏ bold/italic markdown: **text** → text    *text* → text
            cleaned = cleaned.replace(/\*\*(.*?)\*\*/g, '$1');               // **bold**
            cleaned = cleaned.replace(/\*(.*?)\*/g, '$1');                   // *italic*
            cleaned = cleaned.replace(/__(.*?)__/g, '$1');                   // __bold__
            cleaned = cleaned.replace(/_(.*?)_/g, '$1');                     // _italic_

            // 3. Loại bỏ heading markdown: # ## ### ####
            cleaned = cleaned.replace(/^[ \t]*#{1,6}[ \t]+/gm, '');

            // 4. Loại bỏ code block và inline code
            cleaned = cleaned.replace(/```[\s\S]*?```/g, '');                // Code block
            cleaned = cleaned.replace(/`([^`]+)`/g, '$1');                   // `inline code`

            // 5. Loại bỏ dấu gạch ngang thừa và khoảng trắng lạ
            cleaned = cleaned.replace(/^-{3,}/gm, '');                        // ---
            cleaned = cleaned.replace(/^\s*[-=]+\s*$/gm, '');                 // Dòng gạch ngang

            // 6. Chuẩn hóa khoảng trắng (nhiều khoảng trắng → 1 khoảng trắng)
            cleaned = cleaned.replace(/[ \t]+/g, ' ');                        // Nhiều space/tab
            cleaned = cleaned.replace(/\n\s*\n\s*\n/g, '\n\n');               // Nhiều dòng trống → 2 dòng

            // 7. Loại bỏ khoảng trắng thừa đầu/cuối mỗi dòng
            cleaned = cleaned.split('\n').map(line => line.trim()).join('\n');

            // 8. Loại bỏ khoảng trắng thừa ở đầu và cuối toàn bộ văn bản
            cleaned = cleaned.trim();

            return cleaned;
        }

        // Parse range (e.g. "2" or "6-7" or "1,3-5")
        function parseRange(str, maxPage) {
            if (!str) return [];
            str = str.replace(/\s+/g, "");
            const pages = new Set();

            for (let part of str.split(",")) {
                if (/^\d+$/.test(part)) {
                    const p = parseInt(part);
                    if (p >= 1 && p <= maxPage) pages.add(p);
                } else if (/^\d+-\d+$/.test(part)) {
                    let [start, end] = part.split("-").map(Number);
                    if (start > end) [start, end] = [end, start];
                    for (let i = Math.max(1, start); i <= Math.min(maxPage, end); i++) {
                        pages.add(i);
                    }
                }
            }
            return [...pages].sort((a, b) => a - b);
        }

        // Render page for OCR (base64)
        async function renderPageForOCR(page) {
            const viewport = page.getViewport({ scale: 1.5 });
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            await page.render({ canvasContext: ctx, viewport }).promise;
            return canvas.toDataURL("image/jpeg", 0.75).split(",")[1];
        }

        // Call Gemini
        async function callGeminiBatch(images, retryCount = 0) {
            try {
                const parts = [{ text: "Extract all readable text accurately, merge breaks to a proper paragraph. Do not modify the content, do not write extra content." }];

                images.forEach(img => {
                    parts.push({ inline_data: { mime_type: "image/jpeg", data: img } });
                });

                const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash-lite:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts }] })
                });

                if (!res.ok) throw new Error(`API Error: ${res.status}`);

                const data = await res.json();

                const extracted = data.candidates?.[0]?.content?.parts?.[0]?.text || "";

                if (!extracted.trim()) throw new Error("Empty response from Gemini");

                return extracted;
            } catch (err) {
                console.warn(`Batch failed (attempt ${retryCount + 1}/${MAX_RETRIES}):`, err.message);

                if (retryCount < MAX_RETRIES - 1) {
                    const delay = Math.pow(2, retryCount) * 1000;

                    await new Promise(r => setTimeout(r, delay));

                    return callGeminiBatch(images, retryCount + 1);
                }

                throw new Error(`Failed after ${MAX_RETRIES} attempts: ${err.message}`);
            }
        }

        // Update upload area with filename
        function updateFileNameDisplay(file) {
            currentFileName = file.name;
            const uploadArea = document.querySelector("#pdf-input").parentElement.querySelector("div");
            uploadArea.innerHTML = `
            <span class="material-symbols-outlined text-4xl mb-3 text-primary">description</span>
            <p class="font-medium text-sm break-all text-center px-2">${file.name}</p>
            <p class="text-xs text-on-surface-variant mt-1">Đã chọn • Nhấn CHUYỂN ĐỔI để xử lý</p>
        `;
        }

        // Copy & Export
        async function copyToClipboard() {
            const text = document.getElementById("output").innerText.trim();
            if (!text) return alert("Không có nội dung để sao chép!");
            await navigator.clipboard.writeText(text);
            alert("Đã sao chép nội dung vào clipboard!");
        }

        function exportText() {
            const text = document.getElementById("output").innerText.trim();
            if (!text) return alert("Không có nội dung để xuất!");
            const blob = new Blob([text], { type: "text/plain" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = currentFileName ? currentFileName.replace(/\.pdf$/i, "_text.txt") : "extracted_text.txt";
            a.click();
        }

        // ====================== MAIN CONVERT ======================
        document.getElementById("convert-button").addEventListener("click", async () => {
            const file = document.getElementById("pdf-input").files[0];
            if (!file) return alert("Vui lòng chọn file PDF!");

            const outputEl = document.getElementById("output");
            const progressBar = document.getElementById("progress-bar");
            const progressText = document.getElementById("progress-text");

            outputEl.innerHTML = "<p class='italic text-gray-500'>Đang khởi tạo...</p>";
            progressBar.style.width = "0%";
            progressText.textContent = "0%";

            try {
                await waitForPdfjs();

                const buffer = await file.arrayBuffer();
                currentPdf = await pdfjsLib.getDocument({ data: buffer }).promise;

                const mode = document.getElementById("page-mode").value;
                const rangeStr = document.getElementById("page-range").value.trim();

                let pages = (mode === "all")
                    ? Array.from({ length: currentPdf.numPages }, (_, i) => i + 1)
                    : parseRange(rangeStr, currentPdf.numPages);

                if (pages.length === 0) return alert("Khoảng trang không hợp lệ!");

                let finalText = "";
                let processed = 0;

                for (let i = 0; i < pages.length; i += BATCH_SIZE) {
                    const batch = pages.slice(i, i + BATCH_SIZE);
                    const images = [];

                    for (let num of batch) {
                        outputEl.innerText = `Đang render trang ${num}...`;
                        const page = await currentPdf.getPage(num);
                        const base64 = await renderPageForOCR(page);
                        images.push(base64);
                    }

                    outputEl.innerText = `Đang trích xuất văn bản...`;
                    const extracted = await callGeminiBatch(images);
                    finalText += cleanExtractedText(extracted) + "\n\n";

                    outputEl.innerHTML += `<div class="mb-6">${cleaned || '<span class="text-gray-400">Không có văn bản trên trang này.</span>'}</div>`;
                    outputEl.scrollTop = outputEl.scrollHeight;

                    processed += batch.length;
                    const percent = Math.round((processed / pages.length) * 100);
                    progressBar.style.width = percent + "%";
                    progressText.textContent = percent + "%";
                }

                outputEl.innerHTML = finalText.trim()
                    ? `<div class="whitespace-pre-wrap">${finalText.trim()}</div>`
                    : "<p class='italic text-gray-500'>Không tìm thấy văn bản nào.</p>";

            } catch (err) {
                console.error(err);
                outputEl.innerHTML = `<p class="text-red-600">Lỗi: ${err.message || "Không thể xử lý"}</p>`;
            }
        });

        // File selected → show filename + preview first page
        document.getElementById("pdf-input").addEventListener("change", async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            updateFileNameDisplay(file);

            document.getElementById("preview-container").innerHTML =
                `<p class="text-gray-400 text-sm">Đang tải preview trang 1...</p>`;

            try {
                await waitForPdfjs();
                const buffer = await file.arrayBuffer();
                currentPdf = await pdfjsLib.getDocument({ data: buffer }).promise;
                await renderPreviewPage(1);
            } catch (err) {
                console.error(err);
                document.getElementById("preview-container").innerHTML =
                    `<p class="text-red-500 text-sm">Không tải được preview</p>`;
            }
        });

        // Page range changed → update preview to first page in range
        document.getElementById("page-range").addEventListener("input", async function () {
            if (!currentPdf) return;
            const pages = parseRange(this.value.trim(), currentPdf.numPages);
            if (pages.length > 0) {
                await renderPreviewPage(pages[0]);
            }
        });

        // Toggle range input visibility
        document.getElementById("page-mode").addEventListener("change", function () {
            document.getElementById("range-container").classList.toggle("hidden", this.value === "all");
            if (this.value === "all" && currentPdf) {
                renderPreviewPage(1);
            }
        });
    </script>
</body>

</html>
